spring.application.name=samabank-backend

# == Base de données : MySQL local ==
# La base samabank est créée automatiquement si absente. Identifiants
# surchargeables via les variables d'environnement DB_USERNAME / DB_PASSWORD.
spring.datasource.url=jdbc:mysql://localhost:3306/samabank?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:spring_user}
spring.datasource.password=${DB_PASSWORD:spring}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# == JPA / Hibernate (schéma géré par Hibernate, pas de Flyway) ==
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# == Divers ==
spring.threads.virtual.enabled=true
spring.jackson.default-property-inclusion=non_null
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
server.port=8080

# == Propriétés métier & sécurité (liées via SamaBankProperties) ==
# Secret JWT (>= 32 caractères). À surcharger via JWT_SECRET en production.
samabank.security.jwt.secret=${JWT_SECRET:samabank-dev-secret-key-change-me-in-production-please-0123456789}
samabank.security.jwt.access-expiration-ms=900000
samabank.security.jwt.refresh-expiration-ms=604800000
samabank.security.jwt.issuer=samabank
# RG-4 : seuil de validation des virements (FCFA)
samabank.banque.seuil-validation-virement=5000000
samabank.banque.devise-par-defaut=XOF

# == Actuator ==
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# == Logs ==
logging.level.sn.samabank=DEBUG
